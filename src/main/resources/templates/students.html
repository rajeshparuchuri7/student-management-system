<!DOCTYPE html>
<html xmlns:th = "https://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>student Management System</title>
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css"
	integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh"
	crossorigin="anonymous">
</head>
<body style="background-color:#f4f6f9;">

<nav class="navbar navbar-expand-md bg-dark navbar-dark">
  <!-- Brand -->
  <a class="navbar-brand" href="#">Student Management System</a>

  <!-- Toggler/collapsibe Button -->
  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
    <span class="navbar-toggler-icon"></span>
  </button>

  <!-- Navbar links -->
  <div class="collapse navbar-collapse" id="collapsibleNavbar">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link" th:href="@{/students}">Student Management</a>
      </li>
      
    </ul>
  </div>
</nav>


     <div class = "container">
     <div class = "row">
     <h1 class="text-center mt-4 mb-4 font-weight-bold text-black">  List Students </h1>
     
     </div>
     
     <div class = "row">
       <div class = "col-lg-3">
        <a th:href = "@{/students/new}" class = "btn btn-primary btm-sm mb-3"> Add Student </a>
       </div>
       
       
<div class="col-lg-6">
    <form th:action="@{/students/search}" method="get" class="form-inline">

        <input type="text"
               name="keyword"
               class="form-control mr-2"
               placeholder="Search Student"
               style="width:250px; height:38px;">

        <button type="submit" class="btn btn-success">
            Search
        </button>

    </form>
</div>
     
     </div>
     <table class = "table table-striped  table-bordered">
     <thead class = "table-dark">
     <tr>
        <th> Student First Name </th>
        <th> Student Last Name </th>
        <th> Student Email </th>
        <th> Actions </th>
     </tr>
     </thead>
     
     <tbody>
     <tr th:each = "student: ${students}">
         <td th:text = "${student.firstName}"></td>
         <td th:text = "${student.lastName}"></td>
         <td th:text = "${student.email}"></td>
         <td>
         <a th:href = "@{/students/edit/{id}(id=${student.id})}" class = "btn btn-primary">Update</a>
         <a th:href = "@{/students/{id}(id=${student.id})}" class = "btn btn-danger">Delete</a>
         </td>
     </tr>
     </tbody>
     
     </table>
     </div>

</body>
</html>
